name: CI - bot-serveur-mc

on:
  push:
    branches: [main]
    paths:
      - "bot-serveur-mc/**"
      - ".github/workflows/ci-serveur-mc.yml"
  pull_request:
    branches: [main]
    paths:
      - "bot-serveur-mc/**"
      - ".github/workflows/ci-serveur-mc.yml"

jobs:
  ci:
    name: Lint, Type Check & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot-serveur-mc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: bot-serveur-mc/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Format check (Ruff)
        run: ruff format --check .

      - name: Lint (Ruff)
        run: ruff check .

      - name: Type check (MyPy)
        run: mypy .

      - name: Tests with coverage
        run: pytest
