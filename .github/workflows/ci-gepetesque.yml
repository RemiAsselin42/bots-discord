name: CI - bot-gepetesque

on:
  push:
    branches: [main]
    paths:
      - "bot-gepetesque/**"
      - ".github/workflows/ci-gepetesque.yml"
  pull_request:
    branches: [main]
    paths:
      - "bot-gepetesque/**"
      - ".github/workflows/ci-gepetesque.yml"

jobs:
  ci:
    name: Lint, Type Check & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot-gepetesque

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: bot-gepetesque/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (TypeScript)
        run: npm run type-check

      - name: Tests with coverage
        run: npm run test:coverage
